services:
  php:
    build:
      context: .
    container_name: stock_report_php
    ports:
      - "8700:80"
    environment:
      DB_HOST: host.docker.internal
      DB_PORT: 3306
      DB_DATABASE: stock_report
      DB_USERNAME: stock_user
      DB_PASSWORD: stock_pass
    volumes:
      - ./:/var/www/html
